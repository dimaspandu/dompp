<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DOM++ Tests</title>
</head>
<body>
  <div id="output"></div>
  <script type="module">
    import {
      setTextImpl,
      setStylesImpl,
      setAttributesImpl,
      setChildrenImpl,
      setEventsImpl,
      setStateImpl,
      createDomppContext,
      createDomppSetterContext
    } from '/dompp';

    const output = document.getElementById('output');
    const log = (msg) => {
      console.log(msg);
      output.innerHTML += msg + '<br>';
    };

    log('Running DOM++ Unit Tests...');

    // Mock element factory
    const createMockElement = () => ({
      textContent: '',
      style: {},
      attributes: [],
      children: [],
      childNodes: [],
      firstChild: null,
      lastChild: null,
      __dompp_handlers: {},
      __dompp_state: {},
      __dompp_bindings: new Set(),
      __dompp_flushScheduled: false,
      setAttribute: function(name, value) { this.attributes.push({name, value}); },
      getAttribute: function(name) { return this.attributes.find(a => a.name === name)?.value; },
      removeAttribute: function(name) { this.attributes = this.attributes.filter(a => a.name !== name); },
      addEventListener: function(type, handler) { this.__dompp_handlers[type] = handler; },
      removeEventListener: function(type) { /* mock */ },
      replaceChildren: function(...nodes) { this.childNodes = nodes; this.children = nodes.filter(n => n.nodeType === 1); }
    });

    // Test setTextImpl
    log('Testing setTextImpl...');
    const el1 = createMockElement();
    setTextImpl.call(el1, 'Test Text');
    if (el1.textContent === 'Test Text') {
      log('✓ setTextImpl basic passed');
    } else {
      log('✗ setTextImpl basic failed');
    }

    // Test setStylesImpl
    log('Testing setStylesImpl...');
    const el2 = createMockElement();
    setStylesImpl.call(el2, { color: 'red', fontSize: '14px' });
    if (el2.style.color === 'red' && el2.style.fontSize === '14px') {
      log('✓ setStylesImpl passed');
    } else {
      log('✗ setStylesImpl failed');
    }

    // Test setAttributesImpl
    log('Testing setAttributesImpl...');
    const el3 = createMockElement();
    setAttributesImpl.call(el3, { id: 'test', 'data-test': 'value' });
    if (el3.getAttribute('id') === 'test' && el3.getAttribute('data-test') === 'value') {
      log('✓ setAttributesImpl passed');
    } else {
      log('✗ setAttributesImpl failed');
    }

    // Test setChildrenImpl
    log('Testing setChildrenImpl...');
    const el4 = createMockElement();
    const child1 = createMockElement();
    child1.textContent = 'Child 1';
    setChildrenImpl.call(el4, child1, 'Text Node');
    if (el4.childNodes.length === 2 && el4.childNodes[0] === child1 && el4.childNodes[1].textContent === 'Text Node') {
      log('✓ setChildrenImpl passed');
    } else {
      log('✗ setChildrenImpl failed');
    }

    // Test setEventsImpl
    log('Testing setEventsImpl...');
    const el5 = createMockElement();
    let clicked = false;
    setEventsImpl.call(el5, {
      click: () => clicked = true
    });
    el5.__dompp_handlers.click();
    if (clicked) {
      log('✓ setEventsImpl passed');
    } else {
      log('✗ setEventsImpl failed');
    }

    // Test setStateImpl
    log('Testing setStateImpl...');
    const el6 = createMockElement();
    setStateImpl.call(el6, { count: 0 });
    setStateImpl.call(el6, prev => ({ count: prev.count + 1 }));
    if (el6.__dompp_state.count === 1) {
      log('✓ setStateImpl passed');
    } else {
      log('✗ setStateImpl failed');
    }

    // Test createDomppContext
    log('Testing createDomppContext...');
    const el7 = createMockElement();
    el7.children = [child1];
    el7.childNodes = [child1, document.createTextNode('text')];
    el7.firstChild = child1;
    el7.lastChild = document.createTextNode('text');
    const ctx = createDomppContext(el7);
    if (ctx.children.length === 1 && ctx.childNodes.length === 2) {
      log('✓ createDomppContext passed');
    } else {
      log('✗ createDomppContext failed');
    }

    log('Unit tests completed.');
  </script>
</body>
</html>
