<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>Basic Styles</title>

  <style>
    body {
      font-family: sans-serif;
      padding: 24px;
    }

    button {
      padding: 12px 16px;
      cursor: pointer;
    }
  </style>
</head>
<body>

<h1>Basic Styles</h1>

<div id="app"></div>

<script src="../../src/1.0.0/index.js"></script>

<script>

const case2 =
  document.createElement("div")
    .setAttributes({
      class: "box"
    })
    .setStyles({
      background: "#f5f5f5",
      color: "#333",
      fontSize: "20px"
    })
    .setText("Styled Element");

app.append(case2);

</script>

</body>
</html>
