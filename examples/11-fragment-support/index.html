<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>Fragment Support</title>

  <style>
    body {
      font-family: sans-serif;
      padding: 24px;
    }

    button {
      padding: 12px 16px;
      cursor: pointer;
    }
  </style>
</head>
<body>

<h1>Fragment Support</h1>

<div id="app"></div>

<script src="../../src/1.0.0/index.js"></script>

<script>

const fragment =
  document.createDocumentFragment()
    .setChildren(
      document.createElement("hr"),
      document.createElement("div")
        .setText("Fragment Child")
    );

app.append(fragment);

</script>

</body>
</html>
