<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <link
    rel="icon"
    type="image/svg+xml"
    href="../assets/favicon.svg"
  />

  <title>
    DOM++ Examples
  </title>

  <style>

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      height: 100%;
      font-family: sans-serif;
      background: #f5f5f5;
      color: #222;
    }

    body {
      display: flex;
      overflow: hidden;
    }

    /* hidden checkbox for mobile menu toggle */
    #menu-toggle {
      position: absolute;
      opacity: 0;
      pointer-events: none;
    }

    /* ===================================
       SIDEBAR
    =================================== */

    .sidebar {

      width: 320px;

      background: #111;

      color: white;

      display: flex;

      flex-direction: column;

      border-right:
        1px solid rgba(255,255,255,0.08);

      /* default desktop positioning */
      position: relative;
      height: 100vh;
    }

    .sidebar-header {

      padding: 24px;

      border-bottom:
        1px solid rgba(255,255,255,0.08);
    }

    .sidebar-header h1 {
      margin: 0 0 8px;
      font-size: 28px;
    }

    .sidebar-header p {

      margin: 0;

      color: rgba(255,255,255,0.7);

      line-height: 1.6;

      font-size: 14px;
    }

    .nav {

      flex: 1;

      overflow: auto;

      padding: 12px;
    }

    .group-title {

      font-size: 12px;

      text-transform: uppercase;

      letter-spacing: 1px;

      opacity: 0.5;

      margin:
        24px 12px 12px;
    }

    .nav a {

      display: block;

      color: white;

      text-decoration: none;

      padding: 14px 16px;

      border-radius: 12px;

      margin-bottom: 6px;

      transition:
        background 0.15s ease;
    }

    .nav a:hover {
      background: rgba(255,255,255,0.08);
    }

    .nav a.active {
      background: white;
      color: black;
      font-weight: bold;
    }

    /* hamburger label (uses spans inside) */
    .hamburger {
      display: none; /* shown on mobile via media query */
      width: 44px;
      height: 44px;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      padding: 8px;
      position: relative;
      z-index: 70; /* above backdrop */
      -webkit-tap-highlight-color: transparent;
      background: transparent;
    }

      .hamburger .bar {
      width: 22px;
      height: 2px;
      background: #111;
      display: inline-block;
      margin: 3px 0;
      border-radius: 1px;
      transition: transform 0.2s ease, opacity 0.2s ease, background 0.2s ease;
      transform-origin: center;
    }

    /* ensure hamburger bars contrast on topbar */
    @media (max-width:900px) {
      .topbar { background: white }
      .hamburger .bar { background: #111 }
      #menu-toggle:checked + .hamburger .bar { background: white }
    }


    /* ===================================
       CONTENT
    =================================== */

    .content {

      flex: 1;

      display: flex;

      flex-direction: column;

      overflow: hidden;
    }

    .topbar {

      height: 64px;

      background: white;

      border-bottom:
        1px solid #ddd;

      display: flex;

      align-items: center;

      padding: 0 24px;

      font-weight: bold;
    }

    iframe {

      flex: 1;

      width: 100%;

      border: none;

      background: white;
    }

    /* ===================================
       MOBILE
    =================================== */

    @media (max-width: 900px) {

      body {
        flex-direction: column;
      }

      /* show hamburger in topbar */
      .hamburger {
        display: inline-flex;
        position: fixed;
        top: 12px;
        right: 12px;
        left: auto;
        width: 44px;
        height: 44px;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: rgba(255,255,255,0.0);
        border-radius: 8px;
        z-index: 70;
      }

      .hamburger .bar {
        width: 20px;
        height: 2px;
        background: #111;
        display: block;
        margin: 3px 0;
        border-radius: 1px;
        transition: transform 0.25s ease, opacity 0.2s ease, background 0.2s ease;
        transform-origin: center;
      }

      .topbar {
        padding-left: 16px;
        padding-right: 56px; /* leave space for hamburger on right */
        gap: 12px;
      }

      /* keep original sidebar out of flow; we'll use it as overlay */
      .sidebar {
        width: 100%;
        height: 100vh;
        position: fixed;
        top: 0;
        left: 0;
        transform: translateY(-100%);
        transition: transform 0.25s ease;
        z-index: 60;
        border-right: none;
        border-bottom: none;
      }

      /* When menu toggle checked, show full-screen overlay (sticky) */
      #menu-toggle:checked ~ .sidebar {
        transform: translateY(0);
      }

      /* make overlay scrollable if content long */
      .sidebar {
        overflow: auto;
        -webkit-overflow-scrolling: touch;
      }

      /* dark background behind menu implemented with label.overlay-backdrop */
      label.overlay-backdrop { display:none }

      /* show backdrop when menu open; clicking it toggles checkbox off */
      #menu-toggle:checked ~ label.overlay-backdrop {
        display: block;
        position: fixed;
        inset: 0;
        background: rgba(0,0,0,0.35);
        z-index: 50;
      }

      /* ensure backdrop sits behind the hamburger but above content */
      label.overlay-backdrop { z-index: 55 }



      /* Make label clickable to close menu when link focused: wrap links in label pointing to checkbox */
      .nav-link-wrap {
        display: block;
      }

      /* ensure clicks on links still navigate target iframe; label is used only to toggle checkbox */
      .nav-link-wrap a { display:block }

      /* hide checkbox on desktop (already hidden) but ensure label doesn't appear on desktop */
      .nav-link-wrap { cursor: pointer }


      /* transform hamburger to X when checked */
      #menu-toggle:checked + .hamburger .bar:nth-child(1) {
        transform: translateY(6px) rotate(45deg);
        background: #fff;
      }

      #menu-toggle:checked + .hamburger .bar:nth-child(2) {
        transform: scaleX(0);
        opacity: 0;
      }

      #menu-toggle:checked + .hamburger .bar:nth-child(3) {
        transform: translateY(-6px) rotate(-45deg);
        background: #fff;
      }



      /* Remove focus-within trick (can leave checkbox checked) — rely on label.nav-link-wrap to toggle checkbox and close menu */
      /* (previous focus-within rule removed) */

      /* make links larger for touch */
      .nav a {
        padding: 16px 18px;
        font-size: 16px;
      }

    }

  </style>
</head>
<body>

<input id="menu-toggle" type="checkbox" />
<label class="hamburger" for="menu-toggle" aria-hidden="true">
  <span class="bar"></span>
  <span class="bar"></span>
  <span class="bar"></span>
</label>
