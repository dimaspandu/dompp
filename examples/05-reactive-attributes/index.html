<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>Reactive Attributes</title>

  <style>
    body {
      font-family: sans-serif;
      padding: 24px;
    }

    button {
      padding: 12px 16px;
      cursor: pointer;
    }
  </style>
</head>
<body>

<h1>Reactive Attributes</h1>

<div id="app"></div>

<script src="../../src/1.0.0/index.js"></script>

<script>

const input =
  document.createElement("input")
    .setAttributes({
      class: "box",
      placeholder: "Type something..."
    })
    .setState({
      disabled: false
    });

const toggle =
  document.createElement("button")
    .setText("Toggle Disabled")
    .setEvents(() => ({
      click() {
        input.setState(({ state }) => {
          state.disabled =
            !state.disabled;
        });
      }
    }));

input.setAttributes(({ state }) => ({
  disabled: state.disabled
}));

app.append(input);
app.append(toggle);

</script>

</body>
</html>
