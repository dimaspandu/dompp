<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>Basic Events</title>

  <style>
    body {
      font-family: sans-serif;
      padding: 24px;
    }

    button {
      padding: 12px 16px;
      cursor: pointer;
    }
  </style>
</head>
<body>

<h1>Basic Events</h1>

<div id="app"></div>

<script src="../../src/1.0.0/index.js"></script>

<script>

const button =
  document.createElement("button")

    .setText("Click Me")

    .setEvents({
      click() {

        alert("Hello DOM++");

      }
    });

app.append(button);

</script>

</body>
</html>
