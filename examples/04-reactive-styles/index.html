<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>Reactive Styles</title>

  <style>
    body {
      font-family: sans-serif;
      padding: 24px;
    }

    button {
      padding: 12px 16px;
      cursor: pointer;
    }
  </style>
</head>
<body>

<h1>Reactive Styles</h1>

<div id="app"></div>

<script src="../../src/1.0.0/index.js"></script>

<script>

const reactiveStyle =
  document.createElement("div")
    .setAttributes({
      class: "box"
    })
    .setState({
      active: false
    })
    .setText(({ state }) => {
      return state.active
        ? "ACTIVE"
        : "INACTIVE";
    })
    .setStyles(({ state }) => ({
      background: state.active
        ? "limegreen"
        : "tomato",
      color: "white",
      padding: "20px"
    }))
    .setEvents(({ state, setState }) => ({
      click() {
        setState({
          active: !state.active
        });
      }
    }));

app.append(reactiveStyle);

</script>

</body>
</html>
