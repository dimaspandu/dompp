<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>Reactive Counter</title>

  <style>

    body {
      font-family: sans-serif;
      padding: 24px;
      background: #f5f5f5;
      color: #222;
    }

    h1 {
      margin-bottom: 12px;
    }

    .description {
      max-width: 800px;
      line-height: 1.7;
      color: #666;
      margin-bottom: 32px;
    }

    .counter {

      border: none;

      border-radius: 16px;

      padding: 24px 32px;

      font-size: 24px;

      color: white;

      cursor: pointer;

      transition:
        all 0.2s ease;
    }

  </style>
</head>
<body>

<h1>
  Reactive Counter
</h1>

<p class="description">

Reactive setter callbacks automatically
rerun when local state changes.

In this example:
- text
- styles
- attributes

all react to the same state.

</p>

<div id="app"></div>

<script src="../../src/1.0.1/index.js"></script>

<script>

const counter =

  document.createElement("button")

    // ===============================
    // LOCAL STATE
    // ===============================

    .setState({
      count: 0
    })

    // ===============================
    // REACTIVE TEXT
    // ===============================

    .setText(({ state }) => {

      return (
        `Count: ${state.count}`
      );

    })

    // ===============================
    // REACTIVE STYLES
    // ===============================

    .setStyles(({ state }) => ({

      background:

        state.count % 2 === 0
          ? "black"
          : "tomato",

      transform:
        `scale(${1 + state.count * 0.02})`

    }))

    // ===============================
    // REACTIVE ATTRIBUTES
    // ===============================

    .setAttributes(({ state }) => ({

      class:
        "counter",

      title:
        `Current count: ${state.count}`

    }))

    // ===============================
    // EVENTS
    // ===============================

    .setEvents(({ state, setState }) => ({

      click() {

        setState({
          count:
            state.count + 1
        });

      }
    }));

app.setChildren(
  counter
);

</script>

</body>
</html>
