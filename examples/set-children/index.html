<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DOM++ - setChildren Example</title>
</head>
<body>
  <div id="container"></div>
  <script type="module" src="../../src/index.js"></script>
  <script type="module">
    const container = document.getElementById("container");

    container.setChildren(
      document.createElement("h1").setText("setChildren Example"),
      document.createElement("p").setText("This demonstrates setChildren with multiple elements."),
      document.createElement("ul").setChildren(
        document.createElement("li").setText("Item 1"),
        document.createElement("li").setText("Item 2"),
        document.createElement("li").setText("Item 3")
      ),
      "And some text node"
    );
  </script>
</body>
</html>
