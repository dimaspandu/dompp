<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DOM++ - setEvents Example</title>
</head>
<body>
  <div id="container"></div>
  <script type="module" src="../../src/index.js"></script>
  <script type="module">
    const container = document.getElementById("container");

    container.setChildren(
      document.createElement("h1").setText("setEvents Example"),
      document.createElement("button").setText("Click me!").setEvents({
        click: () => alert("Button clicked!")
      }),
      document.createElement("input").setAttributes({ type: "text", placeholder: "Type here" }).setEvents({
        input: (e) => console.log("Input value:", e.target.value)
      }),
      document.createElement("p").setText("Check the console for input events.")
    );
  </script>
</body>
</html>
