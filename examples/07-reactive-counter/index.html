<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>Reactive Counter</title>

  <style>
    body {
      font-family: sans-serif;
      padding: 24px;
    }

    button {
      padding: 12px 16px;
      cursor: pointer;
    }
  </style>
</head>
<body>

<h1>Reactive Counter</h1>

<div id="app"></div>

<script src="../../src/1.0.0/index.js"></script>

<script>

const counter =
  document.createElement("button")
    .setAttributes({
      class: "box"
    })
    .setState({
      count: 0
    })
    .setText(({ state }) => {
      return `Count: ${state.count}`;
    })
    .setEvents(({ state, setState }) => ({
      click() {
        setState({
          count: state.count < 10 ? state.count + 1 : state.count
        });
      }
    }));

app.append(counter);

</script>

</body>
</html>
