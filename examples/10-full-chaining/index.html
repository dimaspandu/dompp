<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>Full Chaining</title>

  <style>
    body {
      font-family: sans-serif;
      padding: 24px;
    }

    button {
      padding: 12px 16px;
      cursor: pointer;
    }
  </style>
</head>
<body>

<h1>Full Chaining</h1>

<div id="app"></div>

<script src="../../src/1.0.0/index.js"></script>

<script>

app.setChildren(

  document.createElement("main")

    .setAttributes({
      class: "app"
    })

    .setStyles({
      fontFamily: "sans-serif",
      padding: "24px",
      display: "flex",
      flexDirection: "column",
      gap: "24px"
    })

    .setChildren(

      // =====================================
      // HERO
      // =====================================

      document.createElement("section")

        .setAttributes({
          class: "hero"
        })

        .setStyles({
          padding: "32px",
          borderRadius: "16px",
          background: "#111",
          color: "white"
        })

        .setChildren(

          document.createElement("h1")
            .setText("DOM++"),

          document.createElement("p")
            .setText(
              "Prototype-based reactive DOM utilities."
            ),

          document.createElement("button")

            .setStyles({
              marginTop: "16px",
              padding: "12px 18px",
              border: "none",
              borderRadius: "8px",
              cursor: "pointer"
            })

            .setText("Get Started")
        ),

      // =====================================
      // FEATURES
      // =====================================

      document.createElement("section")

        .setChildren(

          document.createElement("h2")
            .setText("Features"),

          document.createElement("div")

            .setStyles({
              display: "grid",
              gridTemplateColumns:
                "repeat(auto-fit,minmax(220px,1fr))",
              gap: "16px"
            })

            .setChildren(

              createFeatureCard(
                "No Virtual DOM",
                "Direct native DOM mutation."
              ),

              createFeatureCard(
                "Reactive",
                "Automatic binding updates."
              ),

              createFeatureCard(
                "Tiny",
                "Minimal runtime overhead."
              ),

              createFeatureCard(
                "Chainable",
                "Fluent declarative APIs."
              )
            )
        ),

      // =====================================
      // COUNTER
      // =====================================

      document.createElement("section")

        .setAttributes({
          class: "counter-section"
        })

        .setState({
          count: 0
        })

        .setStyles({
          padding: "24px",
          border: "1px solid #ddd",
          borderRadius: "16px"
        })

        .setChildren(({ state, setState }) => [

          document.createElement("h2")
            .setText("Reactive Counter"),

          document.createElement("p")
            .setText(() => {
              return `Current count: ${state.count}`;
            }),

          document.createElement("div")

            .setStyles({
              display: "flex",
              gap: "12px"
            })

            .setChildren(

              document.createElement("button")

                .setText("+1")

                .setEvents(() => ({
                  click() {

                    setState({
                      count: state.count + 1
                    });

                  }
                })),

              document.createElement("button")

                .setText("Reset")

                .setEvents(() => ({
                  click() {

                    setState({
                      count: 0
                    });

                  }
                }))
            )
        ]),

      // =====================================
      // TODOS
      // =====================================

      document.createElement("section")

        .setState({
          todos: [
            "Learn DOM++",
            "Build app",
            "Ship product"
          ]
        })

        .setStyles({
          padding: "24px",
          border: "1px solid #ddd",
          borderRadius: "16px"
        })

        .setChildren(({ state, setState }) => [

          document.createElement("h2")
            .setText("Todo List"),

          document.createElement("div")

            .setStyles({
              display: "flex",
              flexDirection: "column",
              gap: "8px",
              marginTop: "12px"
            })

            .setChildren(

              ...state.todos.map((todo, index) =>

                document.createElement("div")

                  .setStyles({
                    display: "flex",
                    justifyContent: "space-between",
                    alignItems: "center",
                    padding: "12px",
                    background: "#f5f5f5",
                    borderRadius: "8px"
                  })

                  .setChildren(

                    document.createElement("span")
                      .setText(todo),

                    document.createElement("button")

                      .setText("Delete")

                      .setEvents(() => ({
                        click() {

                          setState(({ state }) => {

                            state.todos.splice(index, 1);

                          });

                        }
                      }))
                  )
              )
            ),

          document.createElement("button")

            .setStyles({
              marginTop: "16px"
            })

            .setText("Add Todo")

            .setEvents(() => ({
              click() {

                setState(({ state }) => {

                  state.todos.push(
                    "Todo " +
                    (state.todos.length + 1)
                  );

                });

              }
            }))
        ]),

      // =====================================
      // FOOTER
      // =====================================

      document.createElement("footer")

        .setStyles({
          padding: "24px",
          textAlign: "center",
          opacity: "0.7"
        })

        .setText(
          "Built with DOM++"
        )
    )
);

// =====================================
// HELPERS
// =====================================

function createFeatureCard(
  title,
  description
) {

  return document.createElement("div")

    .setStyles({
      padding: "20px",
      border: "1px solid #ddd",
      borderRadius: "12px"
    })

    .setChildren(

      document.createElement("h3")
        .setText(title),

      document.createElement("p")
        .setText(description)
    );
}

</script>

</body>
</html>
