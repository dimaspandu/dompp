<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DOM++ - setStyles Example</title>
</head>
<body>
  <div id="container"></div>
  <script type="module" src="../../src/index.js"></script>
  <script type="module">
    const container = document.getElementById("container");

    container.setChildren(
      document.createElement("h1").setText("setStyles Example").setStyles({
        color: "blue",
        fontSize: "24px"
      }),
      document.createElement("p").setText("This paragraph has custom styles.").setStyles({
        backgroundColor: "lightgray",
        padding: "10px",
        borderRadius: "5px"
      }),
      document.createElement("button").setText("Styled Button").setStyles({
        backgroundColor: "green",
        color: "white",
        border: "none",
        padding: "10px 20px",
        cursor: "pointer"
      })
    );
  </script>
</body>
</html>
