<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>Basic Attributes</title>

  <style>
    body {
      font-family: sans-serif;
      padding: 24px;
    }
  </style>
</head>
<body>

<h1>Basic Attributes</h1>

<div id="app"></div>

<script src="../../src/1.0.0/index.js"></script>

<script>

const basicAttributes =
  document.createElement("input")

    .setAttributes({
      type: "text",
      placeholder: "Your name",
      value: "DOM++",
      disabled: false
    });

app.append(basicAttributes);

</script>

</body>
</html>
