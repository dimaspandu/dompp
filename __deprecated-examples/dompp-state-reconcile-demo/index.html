<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DOMPP State Demos</title>
  <style>
    body {
      font-family: "Segoe UI", system-ui, sans-serif;
      margin: 0;
      padding: 32px 20px 60px;
      background: #f6f7fb;
      color: #121826;
    }
    h1 {
      margin-bottom: 6px;
    }
    p {
      margin-top: 0;
      color: #4b5563;
    }
    .grid {
      display: grid;
      gap: 20px;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    }
    .card {
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 16px;
      padding: 16px;
      box-shadow: 0 10px 20px rgba(17, 24, 39, 0.05);
    }
    .card h2 {
      margin: 0 0 8px;
      font-size: 1.1rem;
    }
    .card small {
      color: #6b7280;
    }
    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 10px;
    }
    button {
      border: none;
      border-radius: 999px;
      padding: 6px 12px;
      font-weight: 600;
      cursor: pointer;
      background: #2563eb;
      color: #fff;
    }
    button.secondary {
      background: #e5e7eb;
      color: #111827;
    }
    ul {
      padding-left: 18px;
      margin: 10px 0 0;
    }
    li {
      margin-bottom: 6px;
    }
    .note {
      font-size: 0.85rem;
      color: #6b7280;
      margin-top: 8px;
    }
  </style>
</head>
<body>
  <h1>DOMPP State Demos</h1>
  <p>Live demos for local state, matchById preservation, and cross-element updates.</p>

  <div id="app" class="grid"></div>

  <script type="module" src="./main.js"></script>
</body>
</html>
